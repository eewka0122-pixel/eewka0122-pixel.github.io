<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ultra Fire UI</title>

<style>
* {margin:0;padding:0;box-sizing:border-box;font-family:Arial;}

body {
  background:#000;
  color:white;
  overflow:hidden;
}

/* canvas */
canvas {
  position:fixed;
  top:0;
  left:0;
  z-index:0;
}

/* glow курсора */
.cursor {
  position:fixed;
  width:300px;
  height:300px;
  background: radial-gradient(circle, rgba(255,80,0,0.3), transparent);
  pointer-events:none;
  transform:translate(-50%,-50%);
  z-index:2;
}

/* HERO */
.hero {
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  position:relative;
  z-index:3;
}

/* стекло */
.card {
  backdrop-filter: blur(50px);
  background: rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.2);
  padding:70px;
  border-radius:20px;
  text-align:center;
}

/* неон */
h1 {
  font-size:80px;
  animation: pulse 2s infinite;
}

@keyframes pulse {
  0% {text-shadow:0 0 20px #ff6600;}
  50% {text-shadow:0 0 80px #ff0000;}
  100% {text-shadow:0 0 20px #ff6600;}
}

.btn {
  margin-top:30px;
  padding:15px 35px;
  background:#111;
  border:none;
  border-radius:10px;
  color:white;
  cursor:pointer;
  box-shadow:0 0 20px #ff6600;
  transition:0.3s;
}

.btn:hover {
  transform:scale(1.15);
  box-shadow:0 0 60px #ff0000;
}
</style>
</head>

<body>

<canvas id="c"></canvas>
<div class="cursor" id="cursor"></div>

<section class="hero">
  <div class="card">
    <h1>FIRE CORE</h1>
    <button class="btn">ENTER</button>
  </div>
</section>

<script>
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];

/* курсор */
const cursor = document.getElementById("cursor");
document.addEventListener("mousemove", e=>{
  cursor.style.left=e.clientX+"px";
  cursor.style.top=e.clientY+"px";

  for(let i=0;i<5;i++){
    create(e.clientX,e.clientY);
  }
});

/* клик взрыв */
document.addEventListener("click", e=>{
  for(let i=0;i<60;i++){
    create(e.clientX,e.clientY);
  }
});

/* создание частицы */
function create(x=Math.random()*canvas.width, y=canvas.height){
  particles.push({
    x,
    y,
    vx:(Math.random()-0.5)*6,
    vy:-Math.random()*8-2,
    size:Math.random()*3+1,
    life:120
  });
}

/* основной цикл */
function loop(){
  ctx.fillStyle="rgba(0,0,0,0.2)";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  if(Math.random()<0.5){
    create();
  }

  particles.forEach((p,i)=>{
    p.x+=p.vx;
    p.y+=p.vy;
    p.life--;

    ctx.beginPath();
    ctx.arc(p.x,p.y,p.size,0,Math.PI*2);

    ctx.fillStyle=`rgba(255, ${100+Math.random()*155}, 0, ${p.life/120})`;
    ctx.fill();

    if(p.life<=0) particles.splice(i,1);
  });

  requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
