<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fire Neon Ultra</title>

<style>
* {margin:0;padding:0;box-sizing:border-box;font-family:Arial;}

body {
  background:#000;
  color:white;
  overflow-x:hidden;
}

/* 🔥 canvas */
canvas {
  position:fixed;
  top:0;
  left:0;
  pointer-events:none;
  z-index:0;
}

/* 💡 курсор свет */
.cursor {
  position:fixed;
  width:300px;
  height:300px;
  background: radial-gradient(circle, rgba(255,100,0,0.25), transparent);
  pointer-events:none;
  transform:translate(-50%,-50%);
  z-index:1;
}

/* HERO */
.hero {
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  position:relative;
  z-index:2;
}

/* стекло */
.card {
  backdrop-filter: blur(40px);
  background: rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.2);
  padding:60px;
  border-radius:20px;
  text-align:center;
  animation:fadeUp 1s ease;
}

/* неон */
h1 {
  font-size:70px;
  animation:neonPulse 2s infinite;
  text-shadow:
    0 0 10px #ff6600,
    0 0 40px #ff2200,
    0 0 80px #ff0000;
}

@keyframes neonPulse {
  0% {text-shadow:0 0 10px #ff6600;}
  50% {text-shadow:0 0 60px #ff0000;}
  100% {text-shadow:0 0 10px #ff6600;}
}

@keyframes fadeUp {
  from {opacity:0;transform:translateY(40px);}
  to {opacity:1;transform:translateY(0);}
}

/* кнопка */
.btn {
  margin-top:30px;
  padding:14px 30px;
  background:#111;
  border:none;
  border-radius:10px;
  color:white;
  cursor:pointer;
  transition:0.3s;
  box-shadow:
    0 0 10px #ff6600,
    0 0 30px #ff2200;
}

.btn:hover {
  transform:scale(1.1);
  box-shadow:
    0 0 20px #ff6600,
    0 0 60px #ff0000;
}

/* блоки */
.features {
  padding:100px;
  display:flex;
  justify-content:center;
  gap:20px;
  flex-wrap:wrap;
  position:relative;
  z-index:2;
}

.feature {
  width:250px;
  padding:30px;
  border-radius:15px;
  backdrop-filter: blur(20px);
  background: rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.2);
  transition:0.3s;
  opacity:0;
  transform:translateY(40px);
}

.feature.visible {
  opacity:1;
  transform:translateY(0);
}

.feature:hover {
  transform:translateY(-10px);
  box-shadow:
    0 0 20px #ff6600,
    0 0 40px #ff0000;
}
</style>
</head>

<body>

<canvas id="fire"></canvas>
<div class="cursor" id="cursor"></div>

<section class="hero">
  <div class="card">
    <h1>Fire Energy</h1>
    <p>Next-gen power system</p>
    <button class="btn">Launch</button>
  </div>
</section>

<section class="features">
  <div class="feature">🔥 Energy</div>
  <div class="feature">⚡ Speed</div>
  <div class="feature">🚀 Power</div>
</section>

<script>
// курсор
const cursor = document.getElementById("cursor");
document.addEventListener("mousemove", e => {
  cursor.style.left = e.clientX + "px";
  cursor.style.top = e.clientY + "px";
});

// canvas
const canvas = document.getElementById("fire");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let sparks = [];

// создание искры
function createSpark(x = Math.random()*canvas.width, y = canvas.height) {
  sparks.push({
    x,
    y,
    vx:(Math.random()-0.5)*4,
    vy:-Math.random()*6-2,
    life:100
  });
}

// мышь = искры
document.addEventListener("mousemove", e => {
  for(let i=0;i<3;i++){
    createSpark(e.clientX,e.clientY);
  }
});

// клик = взрыв
document.addEventListener("click", e => {
  for(let i=0;i<30;i++){
    createSpark(e.clientX,e.clientY);
  }
});

// обновление
function update(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  if(Math.random()<0.3) createSpark();

  sparks.forEach((s,i)=>{
    s.x+=s.vx;
    s.y+=s.vy;
    s.life--;

    ctx.beginPath();
    ctx.arc(s.x,s.y,2,0,Math.PI*2);
    ctx.fillStyle = `rgba(255, ${100+Math.random()*155}, 0, ${s.life/100})`;
    ctx.fill();

    if(s.life<=0) sparks.splice(i,1);
  });

  requestAnimationFrame(update);
}
update();

// скролл анимация
const features=document.querySelectorAll(".feature");
window.addEventListener("scroll",()=>{
  features.forEach(el=>{
    const rect=el.getBoundingClientRect();
    if(rect.top<window.innerHeight-50){
      el.classList.add("visible");
    }
  });
});
</script>

</body>
</html>
