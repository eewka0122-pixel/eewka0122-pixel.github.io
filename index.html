<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neon AI</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial, sans-serif;
}

body {
  background: radial-gradient(circle at top, #1a0033, #000);
  color: white;
  overflow-x: hidden;
}

/* 🔥 ЖИВОЙ ФОН */
.glow {
  position: absolute;
  width: 500px;
  height: 500px;
  background: radial-gradient(circle, #a100ff, transparent);
  filter: blur(120px);
  top: -100px;
  left: -100px;
  animation: moveGlow 10s infinite alternate;
}

.glow2 {
  position: absolute;
  width: 400px;
  height: 400px;
  background: radial-gradient(circle, #00d1ff, transparent);
  filter: blur(120px);
  bottom: -100px;
  right: -100px;
  animation: moveGlow 12s infinite alternate;
}

@keyframes moveGlow {
  0% { transform: translate(0,0); }
  100% { transform: translate(80px, -60px); }
}

/* HERO */
.hero {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
}

/* 🧊 СТЕКЛО */
.card {
  backdrop-filter: blur(40px);
  background: rgba(255,255,255,0.08);
  padding: 60px;
  border-radius: 20px;
  border: 1px solid rgba(255,255,255,0.2);
  text-align: center;
  animation: fadeUp 1s ease;
}

/* ✨ АНИМАЦИЯ */
@keyframes fadeUp {
  from {
    opacity: 0;
    transform: translateY(40px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

/* НЕОН ТЕКСТ */
h1 {
  font-size: 60px;
  text-shadow:
    0 0 10px #00d1ff,
    0 0 30px #00d1ff,
    0 0 60px #a100ff;
}

p {
  margin-top: 10px;
  opacity: 0.7;
}

/* ⚡ КНОПКА */
.btn {
  margin-top: 30px;
  padding: 14px 30px;
  border-radius: 10px;
  border: none;
  background: #111;
  color: white;
  cursor: pointer;
  transition: 0.3s;
  box-shadow:
    0 0 10px #00d1ff,
    0 0 30px #a100ff;
}

.btn:hover {
  transform: scale(1.1);
  box-shadow:
    0 0 20px #00d1ff,
    0 0 60px #a100ff;
}

/* FEATURES */
.features {
  padding: 100px 20px;
  display: flex;
  gap: 20px;
  justify-content: center;
  flex-wrap: wrap;
}

.feature {
  width: 260px;
  padding: 30px;
  border-radius: 15px;
  backdrop-filter: blur(20px);
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.2);
  transition: 0.3s;
}

.feature:hover {
  transform: translateY(-10px);
  box-shadow:
    0 0 20px #00d1ff,
    0 0 40px #a100ff;
}

/* CTA */
.cta {
  text-align: center;
  padding: 100px 20px;
}
</style>
</head>

<body>

<div class="glow"></div>
<div class="glow2"></div>

<section class="hero">
  <div class="card">
    <h1>Build The Future</h1>
    <p>Next-gen AI platform for automation</p>
    <button class="btn">Get Started</button>
  </div>
</section>

<section class="features">
  <div class="feature">⚡ Fast Performance</div>
  <div class="feature">🤖 AI Automation</div>
  <div class="feature">🚀 Scalable System</div>
</section>

<section class="cta">
  <h2 style="text-shadow:0 0 10px #00d1ff;">Start Your Journey</h2>
  <button class="btn">Launch Now</button>
</section>

</body>
</html>
