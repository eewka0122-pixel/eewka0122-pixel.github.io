<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neon Ultra</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial;
}

body {
  background: #000;
  color: white;
  overflow-x: hidden;
}

/* 🌌 ДВИЖУЩИЙСЯ ФОН */
.bg {
  position: fixed;
  width: 200%;
  height: 200%;
  background: radial-gradient(circle at 30% 30%, #1a0033, #000);
  z-index: -2;
  transform: translate(-25%, -25%);
}

/* 💡 СВЕТ ЗА КУРСОРОМ */
.cursor-glow {
  position: fixed;
  width: 300px;
  height: 300px;
  background: radial-gradient(circle, rgba(0,209,255,0.2), transparent);
  pointer-events: none;
  transform: translate(-50%, -50%);
  z-index: -1;
}

/* 🧊 СТЕКЛО */
.card {
  backdrop-filter: blur(40px);
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.2);
  border-radius: 20px;
  padding: 60px;
  text-align: center;
}

/* HERO */
.hero {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
}

/* НЕОН */
h1 {
  font-size: 70px;
  text-shadow:
    0 0 10px #00d1ff,
    0 0 40px #00d1ff,
    0 0 80px #a100ff;
}

/* КНОПКА */
.btn {
  margin-top: 30px;
  padding: 14px 30px;
  border-radius: 10px;
  background: #111;
  border: none;
  color: white;
  cursor: pointer;
  transition: 0.3s;
  box-shadow:
    0 0 10px #00d1ff,
    0 0 30px #a100ff;
}

.btn:hover {
  transform: scale(1.1);
  box-shadow:
    0 0 20px #00d1ff,
    0 0 60px #a100ff;
}

/* FEATURES */
.features {
  padding: 100px 20px;
  display: flex;
  gap: 20px;
  justify-content: center;
  flex-wrap: wrap;
}

.feature {
  width: 260px;
  padding: 30px;
  border-radius: 15px;
  backdrop-filter: blur(20px);
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.2);
  transition: 0.3s;
  opacity: 0;
  transform: translateY(40px);
}

.feature.visible {
  opacity: 1;
  transform: translateY(0);
}

.feature:hover {
  transform: translateY(-10px);
  box-shadow:
    0 0 20px #00d1ff,
    0 0 40px #a100ff;
}
</style>
</head>

<body>

<div class="bg"></div>
<div class="cursor-glow" id="cursor"></div>

<section class="hero">
  <div class="card">
    <h1>Neon Future</h1>
    <p>Advanced AI platform</p>
    <button class="btn">Start</button>
  </div>
</section>

<section class="features">
  <div class="feature">⚡ Fast</div>
  <div class="feature">🤖 Smart</div>
  <div class="feature">🚀 Scalable</div>
</section>

<script>
// 💡 курсор свет
const cursor = document.getElementById("cursor");

document.addEventListener("mousemove", e => {
  cursor.style.left = e.clientX + "px";
  cursor.style.top = e.clientY + "px";
});

// ✨ анимация при скролле
const features = document.querySelectorAll(".feature");

window.addEventListener("scroll", () => {
  features.forEach(el => {
    const rect = el.getBoundingClientRect();
    if (rect.top < window.innerHeight - 50) {
      el.classList.add("visible");
    }
  });
});
</script>

</body>
</html>
