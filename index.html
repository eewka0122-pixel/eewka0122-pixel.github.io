<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WebGL Fire</title>

<style>
body{
  margin:0;
  overflow:hidden;
  background:black;
}

canvas{
  position:fixed;
  top:0;
  left:0;
}

.ui{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  color:white;
  text-align:center;
  z-index:2;
}

h1{
  font-size:80px;
  text-shadow:0 0 20px red;
}
</style>
</head>

<body>

<canvas id="gl"></canvas>

<div class="ui">
  <h1>FIRE CORE</h1>
</div>

<script>
const canvas=document.getElementById("gl");
const gl=canvas.getContext("webgl");

canvas.width=innerWidth;
canvas.height=innerHeight;

const vs=gl.createShader(gl.VERTEX_SHADER);
gl.shaderSource(vs,`
attribute vec2 p;
void main(){
  gl_Position=vec4(p,0,1);
}`);
gl.compileShader(vs);

const fs=gl.createShader(gl.FRAGMENT_SHADER);
gl.shaderSource(fs,`
precision mediump float;
uniform float t;
uniform vec2 res;
uniform vec2 mouse;

float rand(vec2 p){
  return fract(sin(dot(p,vec2(12.9898,78.233)))*43758.5453);
}

void main(){
  vec2 uv=gl_FragCoord.xy/res;

  float noise=rand(vec2(uv.x*10.0, uv.y*10.0+t));

  float flame=1.0-uv.y;
  flame+=noise*0.3;

  float dist=distance(uv,mouse);
  flame+=0.2/(dist+0.1);

  vec3 col=vec3(flame*2.0, flame, 0.0);

  gl_FragColor=vec4(col,1.0);
}`);
gl.compileShader(fs);

const prog=gl.createProgram();
gl.attachShader(prog,vs);
gl.attachShader(prog,fs);
gl.linkProgram(prog);
gl.useProgram(prog);

const buf=gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER,buf);
gl.bufferData(gl.ARRAY_BUFFER,new Float32Array([
  -1,-1,1,-1,-1,1,1,1
]),gl.STATIC_DRAW);

const loc=gl.getAttribLocation(prog,"p");
gl.enableVertexAttribArray(loc);
gl.vertexAttribPointer(loc,2,gl.FLOAT,false,0,0);

const timeLoc=gl.getUniformLocation(prog,"t");
const resLoc=gl.getUniformLocation(prog,"res");
const mouseLoc=gl.getUniformLocation(prog,"mouse");

let mouse=[0.5,0.5];

document.addEventListener("mousemove",e=>{
  mouse=[e.clientX/innerWidth,1-e.clientY/innerHeight];
});

function loop(t){
  gl.uniform1f(timeLoc,t*0.001);
  gl.uniform2f(resLoc,canvas.width,canvas.height);
  gl.uniform2f(mouseLoc,mouse[0],mouse[1]);

  gl.drawArrays(gl.TRIANGLE_STRIP,0,4);
  requestAnimationFrame(loop);
}
loop();
</script>

</body>
</html>
